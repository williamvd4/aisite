<div class="card mt-4 mb-4" id="ai-assistant-container">
    <div class="card-header p-0 position-relative mt-n4 mx-3 z-index-2">
        <div class="bg-gradient-primary shadow-primary border-radius-lg pt-4 pb-3">
            <h6 class="text-white text-capitalize ps-3">AI Planning Assistant</h6>
        </div>
    </div>
    <div class="card-body">
        <div id="ai-chat-history" class="mb-3" style="max-height: 300px; overflow-y: auto;">
            <!-- Chat history will be appended here -->
            <p class="text-muted small">Ask for help with objectives, activities, or feedback on this lesson.</p>
        </div>
        <div class="input-group input-group-outline">
            <label class="form-label" for="ai-chat-input">Ask the assistant...</label>
            <input type="text" id="ai-chat-input" class="form-control">
            <button class="btn bg-gradient-primary mb-0" type="button" id="ai-chat-send">
                <i class="material-icons">send</i>
            </button>
        </div>
        <div id="ai-loading" class="text-center mt-2 d-none">
            <div class="spinner-border spinner-border-sm text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
</div>
