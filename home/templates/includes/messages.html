{% if messages %}
<div aria-live="polite" aria-atomic="true"
     style="position: fixed; top: 1rem; right: 1rem; z-index: 1100; min-width: 280px;"
     id="django-messages-container">
  {% for message in messages %}
  <div class="toast show align-items-center text-white border-0 mb-2
              {% if message.tags == 'error' %}bg-gradient-danger
              {% elif message.tags == 'success' %}bg-gradient-success
              {% elif message.tags == 'warning' %}bg-gradient-warning
              {% else %}bg-gradient-info{% endif %}"
       role="alert" aria-live="assertive" aria-atomic="true"
       data-bs-delay="5000">
    <div class="d-flex">
      <div class="toast-body">{{ message }}</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto"
              data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
  {% endfor %}
</div>
<script>
  (function () {
    function initMessages() {
      var container = document.getElementById('django-messages-container');
      if (!container) return;
      container.querySelectorAll('.toast').forEach(function (el) {
        var delay = parseInt(el.dataset.bsDelay || 5000);
        setTimeout(function () {
          el.style.transition = 'opacity 0.5s';
          el.style.opacity = '0';
          setTimeout(function () { el.remove(); }, 500);
        }, delay);
      });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initMessages);
    } else {
      initMessages();
    }
  })();
</script>
{% endif %}
